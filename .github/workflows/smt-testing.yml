name: SMT Testing

on:
  pull_request:
  push:
    branches:
      - main

env:
  CERBERUS_IMAGE_ID: ghcr.io/rems-project/cerberus/cn:release

# cancel in-progress job when a new push is performed
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: SMT testing

    strategy:
      matrix:
        version: [4.14.1]
        compiler: [gcc, clang]

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout CN
        uses: actions/checkout@v6

      - name: System dependencies (ubuntu)
        run: |
          sudo apt-get install build-essential libgmp-dev z3 opam cmake lcov

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Clang
        if: ${{ matrix.compiler != 'gcc' }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main"
          sudo add-apt-repository "deb-src http://apt.llvm.org/jammy/ llvm-toolchain-jammy-22 main"
          sudo apt-get update
          sudo apt-get install clang-22 llvm-22
          sudo ln -sf "$(command -v clang-22)" /usr/local/bin/clang
          # Shadow gcov with LLVM's gcov-compatible tool so lcov's `--gcov-tool gcov`
          # can read clang's coverage data (/usr/local/bin precedes /usr/bin on PATH).
          printf '#!/bin/sh\nexec llvm-cov-22 gcov "$@"\n' | sudo tee /usr/local/bin/gcov > /dev/null
          sudo chmod +x /usr/local/bin/gcov

      - name: Restore OPAM cache
        id: cache-opam-restore
        uses: actions/cache/restore@v5
        with:
          path: ~/.opam
          key: ${{ matrix.version }}-${{ hashFiles('cn.opam') }}

      - name: Setup OPAM
        if: steps.cache-opam-restore.outputs.cache-hit != 'true'
        run: |
          opam init --yes --no-setup --disable-sandboxing --shell=sh --compiler=${{ matrix.version }}
          eval $(opam env --switch=${{ matrix.version }})
          opam repo add --yes --this-switch coq-released https://coq.inria.fr/opam/released
          opam install --deps-only --with-test --yes ./cn.opam z3

      - name: Save OPAM cache
        uses: actions/cache/save@v5
        if: steps.cache-opam-restore.outputs.cache-hit != 'true'
        with:
          path: ~/.opam
          key: ${{ matrix.version }}-${{ hashFiles('cn.opam') }}

      - name: Install CN
        run: |
          sudo ln -sf "$(command -v ${{ matrix.compiler }})" /usr/local/bin/cc
          opam switch ${{ matrix.version }}
          eval $(opam env --switch=${{ matrix.version }})
          opam pin --yes --no-action add cn .
          opam install --yes cn

      - name: Restore test gen cache
        uses: actions/cache/restore@v5
        with:
          path: tests/.test-gen-cache.json
          key: test-gen-cache-smt-${{ matrix.compiler }}-${{ hashFiles('tests/run-cn-test-gen.py', 'tests/cn-test-gen/src/**/*.c') }}
          restore-keys: |
            test-gen-cache-smt-${{ matrix.compiler }}-

      - name: Run CN-SMT-Testing CI tests
        run: |
          sudo ln -sf "$(command -v ${{ matrix.compiler }})" /usr/local/bin/cc
          opam switch ${{ matrix.version }}
          eval $(opam env --switch=${{ matrix.version }})
          cd tests; ./run-cn-test-gen.py -s

      - name: Save test gen cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: tests/.test-gen-cache.json
          key: test-gen-cache-smt-${{ matrix.compiler }}-${{ hashFiles('tests/run-cn-test-gen.py', 'tests/cn-test-gen/src/**/*.c') }}
